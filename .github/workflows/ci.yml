name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest leader/ -v --tb=short

      - name: Run tests with coverage
        run: pytest leader/ --cov=leader --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" --quiet
      - name: Ruff lint
        run: ruff check leader/
      - name: Black format check
        run: black --check leader/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check for hardcoded secrets
        run: |
          # Fail if any real API keys are committed
          if grep -rn "sk-ant-\|sk-proj-\|sk-or-" leader/ --include="*.py" | grep -v "sk-test\|sk-ant-\.\.\.\|sk-ant-YOUR"; then
            echo "ERROR: Possible hardcoded API key found!"
            exit 1
          fi
          echo "No hardcoded secrets found."
